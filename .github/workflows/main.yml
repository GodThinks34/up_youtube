name: 🚀 一键发布 YouTube (手动点火版)

# 触发条件：允许在 GitHub 网页上手动点击运行
on:
  workflow_dispatch:
    inputs:
      video_filename:
        description: '🎬 请输入刚才传到 R2 的视频全名 (例如: 本期排行榜.mp4)'
        required: true
        type: string

jobs:
  build_and_upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run upload script
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_REFRESH_TOKEN_B: ${{ secrets.YOUTUBE_REFRESH_TOKEN_B }}
          YOUTUBE_REFRESH_TOKEN_C: ${{ secrets.YOUTUBE_REFRESH_TOKEN_C }}
          
          # 👇 核心：拼接完整的 R2 下载链接！
          # 教程注意：让观众把下面域名替换成他们自己的 R2 公共域名 (pub-xxx.r2.dev)
          VIDEO_URL: "https://自己的公共域名.r2.dev/${{ github.event.inputs.video_filename }}"
          
        run: python upload_to_yt.py
